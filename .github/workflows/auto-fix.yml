name: Auto-fix Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install anthropic
        run: pip install anthropic

      - name: Run tests
        id: test
        run: ./mvnw test
        continue-on-error: true

      - name: Fix failing tests with Claude
        if: steps.test.outcome == 'failure'
        run: python3 .github/scripts/fix_with_claude.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Re-run tests after fix
        if: steps.test.outcome == 'failure'
        run: ./mvnw test

      - name: Commit fixes
        if: steps.test.outcome == 'failure'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "Auto-fix: Claude fixed failing tests" && git push)
