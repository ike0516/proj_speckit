name: Auto-fix Tests

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install anthropic
        run: pip install anthropic

      - name: Download surefire reports
        uses: actions/download-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix failing tests with Claude
        run: python3 .github/scripts/fix_with_claude.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Re-run tests after fix
        run: ./mvnw test

      - name: Create PR with fixes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-fix/claude-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "Auto-fix: Claude fixed failing tests"
          git push origin "$BRANCH"
          gh pr create \
            --title "Auto-fix: Claude fixed failing tests" \
            --body "Claude が失敗したテストを自動修正しました。差分を確認してマージしてください。" \
            --base main \
            --head "$BRANCH"
