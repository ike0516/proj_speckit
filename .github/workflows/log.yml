name: log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - run: echo "hello"
      - run: echo "my name is test,"
      - run: echo "how are you doing?"

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - run: ./mvnw -q package -DskipTests

      - run: ./mvnw -q test
